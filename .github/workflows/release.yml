name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'swipentap/enva-umbrella/'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Helm lint
        run: |
          for d in swipentap/*/; do
            if [ -f "${d}Chart.yaml" ]; then
              echo "Linting $d"
              helm lint "$d" || exit 1
            fi
          done

      - name: Bump chart versions for this run
        run: |
          for f in swipentap/*/Chart.yaml; do
            sed -i "s/^\(version: \)\(.*\)/\1\2-${{ github.run_number }}/" "$f"
            echo "Set version in $f"
          done

      - name: Add dependency helm repos for cr package
        run: |
          helm repo add bitnami https://raw.githubusercontent.com/bitnami/charts/archive-full-index/bitnami
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Helm dependency update for charts with dependencies
        run: |
          for d in swipentap/*/; do
            if [ -f "${d}Chart.yaml" ] && grep -q "dependencies:" "${d}Chart.yaml"; then
              echo "Running helm dependency update in $d"
              helm dependency update "$d"
            fi
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: swipentap
          config: cr.yaml
          skip_existing: true
          mark_as_latest: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for charts index to have new versions
        run: |
          VERSION="1.0.0-${{ github.run_number }}"
          echo "Waiting for charts index to list tls-secret $VERSION (poll up to 5 min)..."
          for i in $(seq 1 30); do
            if curl -sL https://swipentap.github.io/charts/index.yaml | grep -q "version: $VERSION" && curl -sL https://swipentap.github.io/charts/index.yaml | grep -q "name: tls-secret"; then
              echo "Charts index has $VERSION"
              exit 0
            fi
            echo "Attempt $i/30: index not ready"
            sleep 10
          done
          echo "Timeout: charts index did not have $VERSION after 5 min"
          exit 1

      - name: Clone Umbrella
        uses: actions/checkout@v4
        with:
          repository: swipentap/Umbrella
          path: umbrella
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}

      - name: Update umbrella chart revisions
        run: |
          GITHUB_RUNNER_VER=$(grep '^version:' swipentap/github-runner/Chart.yaml | sed 's/version: //' | tr -d ' ')
          TLS_SECRET_VER=$(grep '^version:' swipentap/tls-secret/Chart.yaml | sed 's/version: //' | tr -d ' ')
          SINS_VER=$(grep '^version:' swipentap/sins/Chart.yaml | sed 's/version: //' | tr -d ' ')
          CERTA_VER=$(grep '^version:' swipentap/certa/Chart.yaml | sed 's/version: //' | tr -d ' ')
          OLLAMA_VER=$(grep '^version:' swipentap/ollama/Chart.yaml | sed 's/version: //' | tr -d ' ')
          POSTGRESQL_VER=$(grep '^version:' swipentap/postgresql/Chart.yaml | sed 's/version: //' | tr -d ' ')
          MAILU_VER=$(grep '^version:' swipentap/mailu/Chart.yaml | sed 's/version: //' | tr -d ' ')
          FREEIPA_VER=$(grep '^version:' swipentap/freeipa/Chart.yaml | sed 's/version: //' | tr -d ' ')
          KC_OPERATOR_VER=$(grep '^version:' swipentap/keycloak-operator/Chart.yaml | sed 's/version: //' | tr -d ' ')
          OPERATORHUB_CATALOG_VER=$(grep '^version:' swipentap/operatorhub-catalog/Chart.yaml | sed 's/version: //' | tr -d ' ')
          HARBOR_RBAC_VER=$(grep '^version:' swipentap/harbor-rbac/Chart.yaml | sed 's/version: //' | tr -d ' ')
          sed -i "s/^githubRunnerChartRevision: .*/githubRunnerChartRevision: \"$GITHUB_RUNNER_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^tlsSecretChartRevision: .*/tlsSecretChartRevision: \"$TLS_SECRET_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^sinsChartRevision: .*/sinsChartRevision: \"$SINS_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^certaChartRevision: .*/certaChartRevision: \"$CERTA_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^ollamaChartRevision: .*/ollamaChartRevision: \"$OLLAMA_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^postgresqlChartRevision: .*/postgresqlChartRevision: \"$POSTGRESQL_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^mailuChartRevision: .*/mailuChartRevision: \"$MAILU_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^freeipaChartRevision: .*/freeipaChartRevision: \"$FREEIPA_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^keycloakOperatorChartRevision: .*/keycloakOperatorChartRevision: \"$KC_OPERATOR_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^operatorhubCatalogChartRevision: .*/operatorhubCatalogChartRevision: \"$OPERATORHUB_CATALOG_VER\"/" umbrella/enva-umbrella/values.yaml
          sed -i "s/^harborRbacChartRevision: .*/harborRbacChartRevision: \"$HARBOR_RBAC_VER\"/" umbrella/enva-umbrella/values.yaml
          SONARQUBE_VER=$(grep '^version:' swipentap/sonarqube/Chart.yaml | sed 's/version: //' | tr -d ' ')
          VAULT_SECRETS_VER=$(grep '^version:' swipentap/vault-secrets/Chart.yaml | sed 's/version: //' | tr -d ' ')
          LANGFLOW_VER=$(grep '^version:' swipentap/langflow/Chart.yaml 2>/dev/null | sed 's/version: //' | tr -d ' ')
          TRAEFIK_VER=$(grep '^version:' swipentap/traefik/Chart.yaml 2>/dev/null | sed 's/version: //' | tr -d ' ')
          sed -i "/- name: tls-secret/,/version:/ s/^    version: .*/    version: \"$TLS_SECRET_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: certa/,/version:/ s/^    version: .*/    version: \"$CERTA_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: postgresql/,/version:/ s/^    version: .*/    version: \"$POSTGRESQL_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: mailu/,/version:/ s/^    version: .*/    version: \"$MAILU_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: sins/,/version:/ s/^    version: .*/    version: \"$SINS_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: ollama/,/version:/ s/^    version: .*/    version: \"$OLLAMA_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: keycloak-operator/,/version:/ s/^    version: .*/    version: \"$KC_OPERATOR_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: github-runner/,/version:/ s/^    version: .*/    version: \"$GITHUB_RUNNER_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: freeipa/,/version:/ s/^    version: .*/    version: \"$FREEIPA_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: sonarqube/,/version:/ s/^    version: .*/    version: \"$SONARQUBE_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: operatorhub-catalog/,/version:/ s/^    version: .*/    version: \"$OPERATORHUB_CATALOG_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: harbor-rbac/,/version:/ s/^    version: .*/    version: \"$HARBOR_RBAC_VER\"/" umbrella/enva-umbrella/Chart.yaml
          sed -i "/- name: vault-secrets/,/version:/ s/^    version: .*/    version: \"$VAULT_SECRETS_VER\"/" umbrella/enva-umbrella/Chart.yaml
          [ -n "$LANGFLOW_VER" ] && sed -i "/- name: langflow/,/version:/ s/^    version: .*/    version: \"$LANGFLOW_VER\"/" umbrella/enva-umbrella/Chart.yaml
          [ -n "$TRAEFIK_VER" ] && sed -i "/- name: traefik/,/version:/ s/^    version: .*/    version: \"$TRAEFIK_VER\"/" umbrella/enva-umbrella/Chart.yaml

      - name: Bump umbrella chart version
        run: |
          sed -i "s/^version: .*/version: 1.0.0-${{ github.run_number }}/" umbrella/enva-umbrella/Chart.yaml

      - name: Add umbrella changes to git
        run: |
          cd umbrella && git add enva-umbrella/values.yaml enva-umbrella/Chart.yaml

      - name: Commit umbrella changes
        run: |
          cd umbrella
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git diff --staged --quiet || git commit -m "chore: chart revisions and version from charts release ${{ github.run_number }}"

      - name: Push umbrella to main
        run: |
          cd umbrella && git push origin main

      - name: Trigger Umbrella release workflow
        run: |
          gh workflow run ".github/workflows/release.yml" --repo swipentap/Umbrella
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}

      - name: Wait for Umbrella release run to complete
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        run: |
          echo "Waiting 20s for Umbrella release run to appear..."
          sleep 20
          RUN_ID=$(gh run list --repo swipentap/Umbrella --workflow "release.yml" --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "No Umbrella release run found"
            exit 1
          fi
          echo "Waiting for Umbrella release run $RUN_ID (poll up to 15 min)..."
          for i in $(seq 1 60); do
            STATUS=$(gh run view "$RUN_ID" --repo swipentap/Umbrella --json status --jq '.status')
            if [ "$STATUS" = "completed" ]; then
              break
            fi
            echo "Attempt $i/60 status=$STATUS"
            sleep 15
          done
          CONCLUSION=$(gh run view "$RUN_ID" --repo swipentap/Umbrella --json conclusion --jq '.conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "Umbrella release run $RUN_ID concluded with: $CONCLUSION"
            gh run view "$RUN_ID" --repo swipentap/Umbrella --log-failed
            exit 1
          fi
          echo "Umbrella release run $RUN_ID succeeded"

      - name: Trigger Umbrella deploy-pages workflow
        run: |
          gh workflow run ".github/workflows/deploy-pages.yml" --repo swipentap/Umbrella
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}

      - name: Wait for umbrella index
        run: |
          VERSION="1.0.0-${{ github.run_number }}"
          echo "Waiting 120s for Umbrella release and Pages deploy..."
          sleep 120
          for i in $(seq 1 60); do
            if curl -sL https://swipentap.github.io/Umbrella/index.yaml | grep -q "version: $VERSION"; then
              echo "Found $VERSION in index"
              exit 0
            fi
            echo "Waiting for $VERSION in index... attempt $i/60"
            sleep 15
          done
          echo "Timeout: $VERSION not in index after 17 min"
          exit 1

      - name: Clone envaapps
        uses: actions/checkout@v4
        with:
          repository: swipentap/envaapps
          path: envaapps
          ref: dev
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}

      - name: Update umbrella app repoURL
        run: |
          sed -i 's|repoURL: .*|repoURL: https://swipentap.github.io/Umbrella|' envaapps/base/applications/umbrella.yaml

      - name: Update umbrella app chart
        run: |
          sed -i 's/^    chart: .*/    chart: enva-umbrella/' envaapps/base/applications/umbrella.yaml

      - name: Update umbrella app targetRevision
        run: |
          sed -i "s/^    targetRevision: .*/    targetRevision: \"1.0.0-${{ github.run_number }}\"/" envaapps/base/applications/umbrella.yaml

      - name: Add envaapps umbrella changes to git
        run: |
          cd envaapps && git add base/applications/umbrella.yaml

      - name: Commit envaapps umbrella update
        run: |
          cd envaapps
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git diff --staged --quiet || git commit -m "chore: umbrella targetRevision 1.0.0-${{ github.run_number }} from charts release"

      - name: Push envaapps to dev
        run: |
          cd envaapps && git push origin dev

