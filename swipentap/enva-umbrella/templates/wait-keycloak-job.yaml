# post-install: wait for keycloak Application to be Healthy before creating eclipse-che, sonarqube
---
apiVersion: batch/v1
kind: Job
metadata:
  name: umbrella-wait-keycloak-{{ .Release.Revision }}
  namespace: argocd
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: wait
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for keycloak Application to be Healthy (timeout 900s)..."
              for i in $(seq 1 180); do
                STATUS=$(kubectl get application keycloak -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Pending")
                if [ "$STATUS" = "Healthy" ]; then
                  echo "keycloak Application is Healthy."
                  exit 0
                fi
                echo "[$i/180] keycloak status=$STATUS, waiting 5s..."
                sleep 5
              done
              echo "Timeout waiting for keycloak Application."
              exit 1
