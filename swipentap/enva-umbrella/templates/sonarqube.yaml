apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.chartsRepo | quote }}
    chart: sonarqube
    targetRevision: {{ .Values.sonarqubeChartRevision | quote }}
    helm:
      releaseName: sonarqube
      valuesObject:
        community:
          enabled: true
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
          hosts:
            - name: sonar.{{ .Values.global.domain }}
          tls:
            - secretName: {{ .Values.global.tlsSecret }}
              hosts:
                - sonar.{{ .Values.global.domain }}
        persistence:
          enabled: true
          storageClass: local-path
          size: 5Gi
        jdbcOverwrite:
          enabled: true
          jdbcUrl: "jdbc:postgresql://postgresql-rw.postgresql.svc.cluster.local:5432/sonar"
          jdbcUsername: sonar
          jdbcSecretName: sonarqube-credentials
          jdbcSecretPasswordKey: db_password
        monitoringPasscode: "define_it"
        sonarProperties:
          sonar.core.serverBaseURL: "https://sonar.{{ .Values.global.domain }}"
        keycloakSaml:
          enabled: true
          keycloakUrl: "http://keycloak-service.keycloak.svc.cluster.local:8080"
          keycloakExternalUrl: "https://auth.{{ .Values.global.domain }}"
          realm: master
          adminUser: admin
          adminPassword: admin
          sonarqubeExternalUrl: "https://sonar.{{ .Values.global.domain }}"
        extraInitContainers:
          - name: wait-for-postgresql
            image: busybox:1.36
            command:
              - sh
              - -c
              - |
                until nslookup postgresql-rw.postgresql.svc.cluster.local; do
                  echo "waiting for postgresql..."
                  sleep 2
                done
          - name: wait-for-keycloak
            image: busybox:1.36
            command:
              - sh
              - -c
              - |
                until nslookup keycloak-service.keycloak.svc.cluster.local; do
                  echo "waiting for keycloak..."
                  sleep 2
                done
          - name: es-lock-cleanup
            image: alpine
            command:
              - /bin/sh
              - -c
              - "[ -d /opt/sonarqube/data/es8 ] && find /opt/sonarqube/data/es8 -name '*.lock' -delete || true"
            volumeMounts:
              - name: sonarqube
                mountPath: /opt/sonarqube/data
                subPath: data
          - name: db-init
            image: postgres:15-alpine
            env:
              - name: POSTGRES_ADMIN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgresql-admin
                    key: admin_password
              - name: SONAR_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: sonarqube-credentials
                    key: db_password
            command:
              - /bin/sh
              - -c
              - |
                set -e
                echo "Waiting for PostgreSQL..."
                until PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c '\q'; do
                  echo "Not ready, retrying..."
                  sleep 2
                done
                echo "Creating role sonar if not exists..."
                if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='sonar'" | grep -q 1; then
                  PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE ROLE sonar WITH LOGIN PASSWORD '$SONAR_DB_PASSWORD';"
                  echo "Role sonar created."
                else
                  echo "Role sonar already exists."
                fi
                echo "Creating database sonar if not exists..."
                if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='sonar'" | grep -q 1; then
                  PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE DATABASE sonar OWNER sonar;"
                  echo "Database sonar created."
                else
                  echo "Database sonar already exists."
                fi
                PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE sonar TO sonar;"
                echo "DB init done."
  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
