apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: {{ .Values.giteaChartRevision | quote }}
    helm:
      releaseName: gitea
      valuesObject:
        global:
          hostAliases:
            - ip: {{ .Values.sins.haproxyIp | quote }}
              hostnames:
                - auth.{{ .Values.global.domain }}
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: false
        valkey-cluster:
          enabled: true
          usePassword: false
          cluster:
            nodes: 3
            replicas: 0
          persistence:
            storageClass: local-path
            size: 2Gi
        persistence:
          storageClass: local-path
          size: 10Gi
        ingress:
          enabled: true
          className: traefik
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
          hosts:
            - host: gitea.{{ .Values.global.domain }}
              paths:
                - path: /
          tls:
            - secretName: {{ .Values.global.tlsSecret }}
              hosts:
                - gitea.{{ .Values.global.domain }}
        gitea:
          admin:
            existingSecret: gitea-credentials
            email: "gitea@{{ .Values.global.domain }}"
            passwordMode: keepUpdated
          config:
            database:
              DB_TYPE: postgres
              HOST: postgresql-rw.postgresql.svc.cluster.local:5432
              NAME: gitea
              USER: gitea
            server:
              SSH_PORT: 22
              SSH_LISTEN_PORT: 2222
              ROOT_URL: "https://gitea.{{ .Values.global.domain }}"
          additionalConfigFromEnvs:
            - name: GITEA__DATABASE__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-credentials
                  key: db_password
          oauth:
            - name: Keycloak
              provider: openidConnect
              existingSecret: gitea-credentials
              autoDiscoverUrl: "http://keycloak-service.keycloak.svc.cluster.local:8080/realms/master/.well-known/openid-configuration"
              scopes: "openid profile email"
        extraVolumes:
          - name: certa-root-ca
            configMap:
              name: certa-root-ca
        extraContainerVolumeMounts:
          - name: certa-root-ca
            mountPath: /etc/ssl/certs/certa-root-ca.crt
            subPath: certa-root-ca.crt
            readOnly: true
        preExtraInitContainers:
          - name: db-init
            image: postgres:15-alpine
            env:
              - name: POSTGRES_ADMIN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: gitea-postgresql-admin
                    key: admin_password
              - name: GITEA_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: gitea-credentials
                    key: db_password
            command:
              - /bin/sh
              - -c
              - |
                set -e
                echo "Waiting for PostgreSQL..."
                until PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c '\q'; do
                  echo "Not ready, retrying..."
                  sleep 2
                done
                echo "Creating role gitea if not exists..."
                if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='gitea'" | grep -q 1; then
                  PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE ROLE gitea WITH LOGIN PASSWORD '$GITEA_DB_PASSWORD';"
                  echo "Role gitea created."
                else
                  echo "Role gitea already exists."
                fi
                echo "Creating database gitea if not exists..."
                if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='gitea'" | grep -q 1; then
                  PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE DATABASE gitea OWNER gitea;"
                  echo "Database gitea created."
                else
                  echo "Database gitea already exists."
                fi
                PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE gitea TO gitea;"
                echo "DB init done."
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
