# pre-install: wait for postgresql Application to be Healthy before creating keycloak, etc.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: umbrella-wait-postgresql-{{ .Release.Revision }}
  namespace: argocd
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: wait
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for postgresql Application to be Healthy (timeout 900s)..."
              for i in $(seq 1 180); do
                STATUS=$(kubectl get application postgresql -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Pending")
                if [ "$STATUS" = "Healthy" ]; then
                  echo "postgresql Application is Healthy."
                  exit 0
                fi
                echo "[$i/180] postgresql status=$STATUS, waiting 5s..."
                sleep 5
              done
              echo "Timeout waiting for postgresql Application."
              exit 1
