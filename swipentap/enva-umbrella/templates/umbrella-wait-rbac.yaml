# RBAC for umbrella wait Jobs - allows reading ArgoCD Applications
# pre-install weight -10 so it exists before the wait Jobs run
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: umbrella-wait
  namespace: argocd
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: umbrella-wait
  namespace: argocd
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: umbrella-wait
subjects:
  - kind: ServiceAccount
    name: default
    namespace: argocd
