apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: {{ .Values.harborChartRevision | quote }}
    helm:
      releaseName: harbor
      valuesObject:
        expose:
          type: ingress
          ingress:
            hosts:
              core: harbor.{{ .Values.global.domain }}
            className: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
          tls:
            certSource: secret
            secret:
              secretName: {{ .Values.global.tlsSecret }}
        externalURL: https://harbor.{{ .Values.global.domain }}
        existingSecretAdminPassword: harbor-credentials
        existingSecretAdminPasswordKey: admin_password
        existingSecretSecretKey: harbor-credentials
        database:
          type: external
          external:
            host: "postgresql-rw.postgresql.svc.cluster.local"
            port: "5432"
            username: "harbor"
            coreDatabase: "registry"
            existingSecret: "harbor-credentials"
            sslmode: "disable"
        core:
          automountServiceAccountToken: true
          initContainers:
            - name: wait-for-credentials
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "Waiting for secret harbor-credentials..."
                  until [ -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; do
                    echo "waiting for service account token..."
                    sleep 2
                  done
                  until wget -q -O /dev/null --header "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" --no-check-certificate "https://kubernetes.default.svc/api/v1/namespaces/harbor/secrets/harbor-credentials"; do
                    echo "waiting for secret harbor-credentials..."
                    sleep 2
                  done
                  echo "Secret harbor-credentials found."
            - name: wait-for-postgresql
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  until nslookup postgresql-rw.postgresql.svc.cluster.local; do
                    echo "waiting for postgresql..."
                    sleep 2
                  done
            - name: db-init
              image: postgres:15-alpine
              env:
                - name: POSTGRES_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-admin
                      key: admin_password
                - name: HARBOR_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: harbor-credentials
                      key: password
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Waiting for PostgreSQL..."
                  until PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c '\q'; do
                    echo "Not ready, retrying..."
                    sleep 2
                  done
                  echo "Creating role harbor if not exists..."
                  if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='harbor'" | grep -q 1; then
                    PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE ROLE harbor WITH LOGIN PASSWORD '$HARBOR_DB_PASSWORD';"
                    echo "Role harbor created."
                  else
                    echo "Role harbor already exists."
                  fi
                  echo "Creating database registry if not exists..."
                  if ! PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='registry'" | grep -q 1; then
                    PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "CREATE DATABASE registry OWNER harbor;"
                    echo "Database registry created."
                  else
                    echo "Database registry already exists."
                  fi
                  PGPASSWORD="$POSTGRES_ADMIN_PASSWORD" psql -h postgresql-rw.postgresql.svc.cluster.local -p 5432 -U postgres -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE registry TO harbor;"
                  echo "DB init done."
        persistence:
          enabled: true
          persistentVolumeClaim:
            registry:
              storageClass: local-path
              size: 20Gi
            chartmuseum:
              storageClass: local-path
            jobservice:
              jobLog:
                storageClass: local-path
            redis:
              storageClass: local-path
            trivy:
              storageClass: local-path
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
