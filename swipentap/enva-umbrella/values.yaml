# env: dev | test | prod - used for domain, tls secret, paths
global:
  env: dev
  domain: dev.net
  tlsSecret: tls-dev-net-wildcard

# charts repo (same as root-apps) for Helm chart revisions
chartsRepo: https://swipentap.github.io/charts
# swipentap charts (auto-updated by release workflow)
githubRunnerChartRevision: "1.0.2-234"
tlsSecretChartRevision: "1.0.0-234"
eclipseCheChartRevision: "1.0.0-234"
keycloakOperatorChartRevision: "1.0.0-234"
sinsChartRevision: "1.0.93-234"
certaChartRevision: "1.0.5-234"
ollamaChartRevision: "0.1.6-234"
postgresqlChartRevision: "1.0.0-234"
mailuChartRevision: "2.6.7-234"
sonarqubeChartRevision: "2026.2.0-174"
freeipaChartRevision: "1.0.8-234"
# external charts (manual updates)
langflowChartRevision: "0.1.0"
redisBitnamiChartRevision: "25.3.0"
redisInsightChartRevision: "1.3.1"
rabbitmqChartRevision: "2.2.5"
rancherChartRevision: "2.13.1"
certManagerChartRevision: "v1.13.3"
devworkspaceOperatorRevision: "v0.39.0"
externalSecretsChartRevision: "0.10.7"
vaultSecretsChartRevision: "0.1.0"
harborChartRevision: "1.18.2"
giteaChartRevision: "12.5.0"

# vault: connection settings for ESO ClusterSecretStore (central Vault at 10.11.1.8)
vault:
  url: "http://10.11.1.8:30200"
  kubeAuthPath: "kubernetes"
  role: "external-secrets"

# mailu: CoreDNS nodeHosts per env (dev subnet 10.11.4.x)
mailu:
  nodeHosts: |
    10.11.4.11 k3s-control
    10.11.4.12 k3s-worker-1
    10.11.4.13 k3s-worker-2
    10.11.4.14 k3s-worker-3

# postgresql: pgadmin ingress host per env
postgresql:
  pgadminHost: pgadmin.dev.net

# sins: haproxy IP per env (dev 10.11.4.17)
sins:
  haproxyIp: "10.11.4.17"

# rancher hostname per env
rancher:
  hostname: rancher.dev.net

# github-runner: runner group and labels per env
githubRunner:
  group: k3s-dev
  labels:
    - k3s
    - k3s-dev

# freeipa: hostname, realm, domain per env (dev defaults)
freeipa:
  hostname: ipa.dev.net
  realm: DEV.NET
  domain: dev.net
  credentialsSecret: freeipa-credentials
  ingressTlsSecret: tls-dev-net-wildcard
  adminPassword: "changeme"
  ldapServiceUserPassword: "changeme"

# eclipse-che: Keycloak client secret per env (set in envaapps overlay)
eclipseCheOAuthSecret: ""

