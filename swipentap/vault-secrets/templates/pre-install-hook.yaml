---
# Waits for ESO webhook to be ready (init container); same check as former PreSync hook.
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-eso-webhook
  namespace: {{ .Release.Namespace }}
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: wait-for-eso-webhook
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-eso-webhook
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for ESO webhook endpoints to be available..."
              until kubectl get endpoints external-secrets-webhook -n external-secrets -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q '.'; do
                echo "ESO webhook not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "ESO webhook is ready."
      containers:
        - name: probe
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c", "echo done"]
