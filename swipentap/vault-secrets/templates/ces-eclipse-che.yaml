---
# eclipseche-credentials in eclipse-che namespace
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: eclipseche-credentials
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - eclipse-che
  refreshTime: "1h"
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: eclipseche-credentials
    data:
      - secretKey: oauth_secret
        remoteRef:
          key: {{ .Values.global.env }}/eclipse-che
          property: oauth_secret
