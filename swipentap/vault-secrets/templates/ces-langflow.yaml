---
# langflow-credentials in langflow namespace
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: langflow-credentials
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - langflow
  refreshTime: "1h"
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: langflow-credentials
    data:
      - secretKey: db_password
        remoteRef:
          key: {{ .Values.global.env }}/langflow
          property: db_password
---
# postgresql-admin in langflow namespace (used by db-init-job)
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: langflow-postgresql-admin
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - langflow
  refreshTime: "1h"
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: postgresql-admin
    data:
      - secretKey: admin_password
        remoteRef:
          key: {{ .Values.global.env }}/postgresql
          property: admin_password
