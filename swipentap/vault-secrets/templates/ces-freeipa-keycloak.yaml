# freeipa-credentials in keycloak namespace (used by keycloak ldap-config Job and keycloak-operator)
# Same Vault path as ces-freeipa; keys match what ldap-config-job and keycloak-operator expect
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: freeipa-credentials-keycloak
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - keycloak
  refreshTime: "1h"
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: freeipa-credentials
    data:
      - secretKey: admin_password
        remoteRef:
          key: {{ .Values.global.env }}/freeipa
          property: admin_password
      - secretKey: ldap_service_user_password
        remoteRef:
          key: {{ .Values.global.env }}/freeipa
          property: ldap_service_user_password
