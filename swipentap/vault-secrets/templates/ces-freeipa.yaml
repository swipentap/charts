---
# freeipa-credentials in freeipa namespace (used by freeipa StatefulSet)
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: freeipa-credentials-freeipa
spec:
  namespaceSelectors:
    - matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - freeipa
  refreshTime: "1h"
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: freeipa-credentials
    data:
      - secretKey: admin-password
        remoteRef:
          key: {{ .Values.global.env }}/freeipa
          property: admin_password
      - secretKey: ds-password
        remoteRef:
          key: {{ .Values.global.env }}/freeipa
          property: admin_password
