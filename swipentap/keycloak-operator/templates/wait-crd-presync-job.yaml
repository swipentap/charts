# Pre-install hook: wait for Keycloak CRD to be established before applying Keycloak CR.
# The operator (installed via OLM Subscription) installs the CRD asynchronously.
# Without this, sync would fail with "no matches for kind Keycloak" until CRD exists.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-wait-crd
  namespace: keycloak
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 60
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: wait-crd
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak CRD keycloaks.k8s.keycloak.org..."
              until kubectl get crd keycloaks.k8s.keycloak.org 2>/dev/null; do
                echo "CRD not ready, retrying in 5s..."
                sleep 5
              done
              echo "CRD established."
              kubectl wait --for=condition=established crd keycloaks.k8s.keycloak.org --timeout=60s
