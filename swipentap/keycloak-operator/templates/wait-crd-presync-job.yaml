# Pre-install hook: wait for FreeIPA to be reachable before main sync (ldap-config-job needs FreeIPA).
# Uses cluster-internal URL; FreeIPA may require Host header from freeipaHostname.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-wait-freeipa
  namespace: keycloak
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 60
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: wait-freeipa
          image: curlimages/curl:8.2.1
          env:
            - name: IPA_HOSTNAME
              value: {{ .Values.freeipaHostname | quote }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for FreeIPA at freeipa.freeipa.svc.cluster.local..."
              until curl -k -s -o /dev/null -w "%{http_code}" --connect-timeout 5 -H "Host: $IPA_HOSTNAME" https://freeipa.freeipa.svc.cluster.local/ipa 2>/dev/null | grep -qE '^([23]0[0-9]|401)$'; do
                echo "FreeIPA not ready, retrying in 5s..."
                sleep 5
              done
              echo "FreeIPA ready."